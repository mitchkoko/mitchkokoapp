<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px; height: 720px;
    font-family: 'Inter', sans-serif;
    background: #E0956A; position: relative;
  }

  .bg {
    position: absolute; inset: 28px; border-radius: 32px;
    background:
      radial-gradient(ellipse at 28% 40%, rgba(255,255,255,0.12) 0%, transparent 55%),
      radial-gradient(ellipse at 78% 62%, rgba(0,0,0,0.14) 0%, transparent 45%),
      radial-gradient(ellipse at 55% 25%, rgba(255,255,255,0.06) 0%, transparent 35%),
      linear-gradient(140deg, #E09070 0%, #D07848 25%, #C06838 50%, #A85030 100%);
  }

  .poly {
    position: absolute; inset: 0; z-index: 1; opacity: 0.07;
  }
  .poly svg { width: 100%; height: 100%; }

  .noise {
    position: absolute; inset: 0; opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
    z-index: 51; pointer-events: none;
  }

  .frame {
    position: absolute; inset: 28px; border-radius: 32px;
    background: linear-gradient(140deg, #E09070 0%, #D07848 25%, #C06838 50%, #A85030 100%);
  }

  .main-text {
    position: absolute; left: 55px; top: 50%;
    transform: translateY(-42%); z-index: 10;
  }

  .main-text h1 {
    font-size: 155px; font-weight: 900;
    line-height: 0.88; letter-spacing: -4px; text-transform: uppercase;
  }

  .main-text h1 .t-claude {
    color: white;
    text-shadow:
      0 0 35px rgba(255,255,255,0.6),
      0 0 70px rgba(255,255,255,0.32),
      0 0 120px rgba(255,255,255,0.16),
      0 0 200px rgba(255,255,255,0.08);
  }

  .main-text h1 .t-code {
    color: rgba(255,255,255,0.65);
    text-shadow:
      0 0 30px rgba(255,255,255,0.35),
      0 0 60px rgba(255,255,255,0.18),
      0 0 100px rgba(255,255,255,0.06);
  }

  .text-glow {
    position: absolute; left: 10px; top: 42%;
    transform: translateY(-50%);
    width: 540px; height: 370px;
    background: radial-gradient(ellipse, rgba(255,255,255,0.06) 0%, transparent 65%);
    z-index: 1;
  }

  .terminal-shadow {
    position: absolute; right: -40px; top: 50%;
    transform: translateY(-48%) rotate(-6deg);
    width: 530px; height: 610px;
    background: linear-gradient(150deg, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.14) 100%);
    border-radius: 28px; z-index: 53;
    border: 1.5px solid rgba(255,255,255,0.06);
    box-shadow: 0 20px 50px rgba(0,0,0,0.12);
  }

  .terminal-float {
    position: absolute; right: -18px; top: 50%;
    transform: translateY(-50%) rotate(-6deg);
    width: 530px; height: 610px;
    background: linear-gradient(150deg, rgba(0,0,0,0.18) 0%, rgba(0,0,0,0.3) 100%);
    border-radius: 28px;
    border: 2px solid rgba(255,220,190,0.16);
    overflow: hidden; z-index: 55;
    box-shadow:
      0 40px 100px rgba(0,0,0,0.28),
      inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .terminal-header {
    height: 48px; background: rgba(0,0,0,0.24);
    display: flex; align-items: center; padding: 0 20px; gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .dot { width: 14px; height: 14px; border-radius: 50%; }
  .dot:nth-child(1) { background: #ff5f57; }
  .dot:nth-child(2) { background: #febc2e; }
  .dot:nth-child(3) { background: #28c840; }

  .terminal-body {
    padding: 28px 26px;
    font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
    font-size: 21px; line-height: 2;
    color: rgba(255,255,255,0.42);
  }

  .p { color: #FFB890; font-weight: bold; }
  .c { color: rgba(255,255,255,0.82); }
  .d { color: rgba(255,255,255,0.24); }
  .s { color: #34d058; }
  .cm { color: rgba(255,255,255,0.18); font-style: italic; }
  .cur {
    display: inline-block; width: 12px; height: 24px;
    background: #FFB890; vertical-align: text-bottom;
    margin-left: 2px; opacity: 0.9;
  }
</style>
</head>
