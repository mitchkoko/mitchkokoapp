<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px; height: 720px;
    font-family: 'Inter', sans-serif;
    background: #E0956A; position: relative;
    overflow: hidden;
  }

  #scene {
    position: absolute; inset: 0;
    transform-origin: 50% 50%;
  }

  .bg {
    position: absolute; inset: 28px; border-radius: 32px;
    background:
      radial-gradient(ellipse at 28% 40%, rgba(255,255,255,0.12) 0%, transparent 55%),
      radial-gradient(ellipse at 78% 62%, rgba(0,0,0,0.14) 0%, transparent 45%),
      radial-gradient(ellipse at 55% 25%, rgba(255,255,255,0.06) 0%, transparent 35%),
      linear-gradient(140deg, #E09070 0%, #D07848 25%, #C06838 50%, #A85030 100%);
  }

  .poly {
    position: absolute; inset: 0; z-index: 1; opacity: 0.07;
  }
  .poly svg { width: 100%; height: 100%; }

  .noise {
    position: absolute; inset: 0; opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
    z-index: 51; pointer-events: none;
  }

  .frame {
    position: absolute; inset: 28px; border-radius: 32px;
    background: linear-gradient(140deg, #E09070 0%, #D07848 25%, #C06838 50%, #A85030 100%);
  }

  .text-glow {
    position: absolute; left: 10px; top: 42%;
    transform: translateY(-50%);
    width: 540px; height: 370px;
    background: radial-gradient(ellipse, rgba(255,255,255,0.06) 0%, transparent 65%);
    z-index: 1; opacity: 0;
  }

  .text-glow-2 {
    display: none;
  }

  .main-text {
    position: absolute; left: 55px; top: 50%;
    transform: translateY(-42%); z-index: 10;
  }

  .main-text h1 {
    font-size: 155px; font-weight: 900;
    line-height: 0.88; letter-spacing: -4px; text-transform: uppercase;
  }

  .main-text h1 .t-claude {
    color: white;
    text-shadow:
      0 0 35px rgba(255,255,255,0.6),
      0 0 70px rgba(255,255,255,0.32),
      0 0 120px rgba(255,255,255,0.16),
      0 0 200px rgba(255,255,255,0.08);
  }

  .main-text h1 .t-code {
    color: rgba(255,255,255,0.65);
    text-shadow:
      0 0 30px rgba(255,255,255,0.35),
      0 0 60px rgba(255,255,255,0.18),
      0 0 100px rgba(255,255,255,0.06);
  }

  .letter {
    display: inline-block;
    opacity: 0;
    filter: blur(8px);
    transform: translateY(30px) scale(1.1);
  }

  .terminal-shadow {
    position: absolute; right: -40px; top: 50%;
    transform: translateY(-48%) rotate(-6deg);
    width: 530px; height: 610px;
    background: linear-gradient(150deg, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.14) 100%);
    border-radius: 28px; z-index: 53;
    border: 1.5px solid rgba(255,255,255,0.06);
    box-shadow: 0 20px 50px rgba(0,0,0,0.12);
    opacity: 0;
  }

  .terminal-float {
    position: absolute; right: -18px; top: 50%;
    transform: translateY(-50%) rotate(-6deg);
    width: 530px; height: 610px;
    background: linear-gradient(150deg, rgba(0,0,0,0.18) 0%, rgba(0,0,0,0.3) 100%);
    border-radius: 28px;
    border: 2px solid rgba(255,220,190,0.16);
    overflow: hidden; z-index: 55;
    box-shadow:
      0 40px 100px rgba(0,0,0,0.28),
      inset 0 1px 0 rgba(255,255,255,0.06);
    opacity: 0;
  }

  .glass-sweep {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(
      105deg,
      transparent 0%, transparent 35%,
      rgba(255,255,255,0.04) 42%,
      rgba(255,255,255,0.10) 50%,
      rgba(255,255,255,0.04) 58%,
      transparent 65%, transparent 100%
    );
    z-index: 100; pointer-events: none;
    opacity: 0;
  }

  .terminal-header {
    height: 48px; background: rgba(0,0,0,0.24);
    display: flex; align-items: center; padding: 0 20px; gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .dot { width: 14px; height: 14px; border-radius: 50%; opacity: 0; transform: scale(0); }
  .dot:nth-child(1) { background: #ff5f57; }
  .dot:nth-child(2) { background: #febc2e; }
  .dot:nth-child(3) { background: #28c840; }

  .terminal-body {
    padding: 28px 26px;
    font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
    font-size: 21px; line-height: 2;
    color: rgba(255,255,255,0.42);
  }

  .terminal-body .line { min-height: 42px; }

  .p { color: #FFB890; font-weight: bold; }
  .c { color: rgba(255,255,255,0.82); }
  .d { color: rgba(255,255,255,0.24); }
  .s { color: #34d058; }
  .cm { color: rgba(255,255,255,0.18); font-style: italic; }
  .cur {
    display: inline-block; width: 12px; height: 24px;
    background: #FFB890; vertical-align: text-bottom;
    margin-left: 2px;
  }

  .vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(0,0,0,0.10) 100%);
    z-index: 200; pointer-events: none;
  }
</style>
</head>

<script>
// ─── Physics-based spring ───────────────────────────────────────────────────
// Returns a value that overshoots 1.0 then settles, given t in [0,1].
// decay: higher = faster settling. freq: oscillation frequency.

function spring(t, decay, freq) {
  if (t <= 0) return 0;
  if (t >= 1) return 1;
  return 1 - Math.exp(-decay * t) * Math.cos(freq * Math.PI * 2 * t);
}

// Spring presets
var SP_MEDIUM_DECAY = 6,   SP_MEDIUM_FREQ = 1.3;   // heading letters (~10% overshoot)
var SP_LOW_DECAY    = 8,   SP_LOW_FREQ    = 1.0;    // terminal (~2% overshoot)
var SP_HIGH_DECAY   = 5,   SP_HIGH_FREQ   = 1.5;    // dots (~19% overshoot)

// ─── Utility ────────────────────────────────────────────────────────────────

function easeOutCubic(x) { return 1 - Math.pow(1 - x, 3); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function progress(t, start, dur) { return clamp((t - start) / dur, 0, 1); }
function lerp(a, b, t) { return a + (b - a) * t; }

// ─── Timeline constants ─────────────────────────────────────────────────────

var DURATION = 7.0;

// Terminal entrance
var TERM_ENTER_START  = 0.0;
var TERM_ENTER_DUR    = 0.8;
var TERM_ENTER_OFFSET = 70;

// Glass sweep
var SWEEP_START = 0.2;
var SWEEP_DUR   = 0.7;

// Dots
var DOT_START   = 0.15;
var DOT_STAGGER = 0.09;
var DOT_DUR     = 0.30;

// Heading letters
var CLAUDE_START    = 0.30;
var CODE_START      = 0.75;
var LETTER_STAGGER  = 0.08;
var LETTER_ANIM_DUR = 0.35;

// Text glow
var GLOW_START = 0.40;
var GLOW_DUR   = 0.70;

// Float starts after terminal is mostly settled
var FLOAT_START = 0.9;

// Dot glow colors (RGB)
var DOT_GLOWS = [
  '255,95,87',   // red
  '254,188,46',  // yellow
  '40,200,64'    // green
];

// ─── Terminal content events ────────────────────────────────────────────────

var TERM_EVENTS = [
  { t: 0.90, mode: 'type',    prompt: '~ $',    text: 'claude',                     speed: 10 },
  { t: 1.60, mode: 'fade',    cls: 'd',         text: '\u00A0\u00A0Starting Claude Code...', dur: 0.30 },
  { t: 2.00, mode: 'ready',   cls: 's',         text: '\u00A0\u00A0\u2713 Ready',   dur: 0.35 },
  { t: 2.40, mode: 'blank' },
  { t: 2.50, mode: 'type',    prompt: '\u276F',  text: 'Build a full-stack',         speed: 26 },
  { t: 3.20, mode: 'type',    prompt: '',         text: '\u00A0\u00A0SaaS app and deploy', speed: 32 },
  { t: 3.85, mode: 'type',    prompt: '',         text: '\u00A0\u00A0to production', speed: 28 },
  { t: 4.40, mode: 'blank' },
  { t: 4.50, mode: 'type',    prompt: '',  text: '# Claude writes code,',  speed: 48, cls: 'cm' },
  { t: 5.10, mode: 'type',    prompt: '',  text: '# runs tests, deploys.', speed: 48, cls: 'cm' },
];

// ─── Precompute natural typing character timings ────────────────────────────

TERM_EVENTS.forEach(function(ev) {
  if (ev.mode === 'type') {
    var baseDur = 1 / ev.speed;
    var cumTime = 0;
    ev.charTimes = [];
    for (var i = 0; i < ev.text.length; i++) {
      var ch = ev.text[i];
      var dur = baseDur;
      // Word-boundary pause: only regular spaces, not nbsp indentation
      if (ch === ' ') dur *= 1.6;
      // Deterministic humanization
      dur *= (1 + 0.12 * Math.sin(i * 7.3));
      cumTime += dur;
      ev.charTimes.push(cumTime);
    }
    ev.totalTime = cumTime;
    ev.endTime = ev.t + cumTime;
  } else if (ev.mode === 'fade' || ev.mode === 'ready') {
    ev.endTime = ev.t + ev.dur;
  }
});

// ─── Build heading letter spans ─────────────────────────────────────────────

var claudeEl = document.getElementById('claude-text');
var codeEl   = document.getElementById('code-text');

'CLAUDE'.split('').forEach(function(ch) {
  var span = document.createElement('span');
  span.className = 'letter';
  span.textContent = ch;
  claudeEl.appendChild(span);
});

'CODE'.split('').forEach(function(ch) {
  var span = document.createElement('span');
  span.className = 'letter';
  span.textContent = ch;
  codeEl.appendChild(span);
});

// ─── Element references ─────────────────────────────────────────────────────

var scene      = document.getElementById('scene');
var termFloat  = document.getElementById('termFloat');
var termShadow = document.getElementById('termShadow');
var termBody   = document.getElementById('termBody');
var glassSweep = document.getElementById('glassSweep');
var dots       = [document.getElementById('dot0'), document.getElementById('dot1'), document.getElementById('dot2')];
var textGlow   = document.getElementById('textGlow');
var textGlow2  = document.getElementById('textGlow2');
var mainText    = document.querySelector('.main-text');
var claudeSpans = claudeEl.querySelectorAll('.letter');
var codeSpans   = codeEl.querySelectorAll('.letter');

// ─── Main render function ───────────────────────────────────────────────────

function setTime(t) {

  // === 1. Scene-level cinematic zoom ===
  var sceneScale = 1 + 0.018 * (t / DURATION);
  scene.style.transform = 'scale(' + sceneScale + ')';

  // Counter-scale heading to cancel scene zoom — prevents sub-pixel text jitter
  mainText.style.transform = 'translateY(-42%) scale(' + (1 / sceneScale) + ')';

  // === 2. Terminal entrance — spring slide + scale ===
  var termRaw = progress(t, TERM_ENTER_START, TERM_ENTER_DUR);
  var termP   = spring(termRaw, SP_LOW_DECAY, SP_LOW_FREQ);
  var termOffsetX = TERM_ENTER_OFFSET * (1 - termP);
  var termScale   = 0.95 + 0.05 * termP;
  var termOp      = Math.min(1, termRaw * 2.5); // fade in faster than position

  // === 3. Terminal floating — ambient breathing (after entrance) ===
  var floatBlend = easeOutCubic(clamp((t - FLOAT_START) / 1.0, 0, 1));
  var floatY = Math.sin(t * 1.1) * 2.5 * floatBlend;
  var floatX = Math.cos(t * 0.7) * 1.2 * floatBlend;

  // Compose terminal transform
  termFloat.style.opacity = termOp;
  termFloat.style.transform =
    'translateY(-50%) translateY(' + floatY + 'px) rotate(-6deg) translateX(' + (termOffsetX + floatX) + 'px) scale(' + termScale + ')';

  // === 4. Terminal border glow pulse ===
  var borderAlpha = 0.18 + 0.06 * Math.sin(t * 2.5);
  termFloat.style.borderColor = 'rgba(255,220,190,' + borderAlpha.toFixed(3) + ')';

  // === 5. Dynamic shadow system ===
  var shadowRaw = progress(t, TERM_ENTER_START + 0.05, TERM_ENTER_DUR);
  var shadowP   = spring(shadowRaw, SP_LOW_DECAY, SP_LOW_FREQ);
  var shadowOffsetX = (TERM_ENTER_OFFSET + 20) * (1 - shadowP);
  var shadowFloatY  = floatY * 0.3;
  var shadowFloatX  = floatX * 0.3;
  var shadowBlur    = 40 + 10 * Math.min(1, shadowRaw * 1.5);

  termShadow.style.opacity = Math.min(1, shadowRaw * 2);
  termShadow.style.transform =
    'translateY(-48%) translateY(' + shadowFloatY + 'px) rotate(-6deg) translateX(' + (shadowOffsetX + shadowFloatX) + 'px)';
  termShadow.style.boxShadow = '0 20px ' + shadowBlur.toFixed(0) + 'px rgba(0,0,0,0.06)';

  // === 6. Glass sweep ===
  var sweepP = progress(t, SWEEP_START, SWEEP_DUR);
  if (sweepP > 0 && sweepP < 1) {
    var sweepX = lerp(-120, 120, sweepP);
    var sweepOp;
    if (sweepP < 0.2) sweepOp = sweepP / 0.2;
    else if (sweepP > 0.8) sweepOp = (1 - sweepP) / 0.2;
    else sweepOp = 1;
    glassSweep.style.opacity = sweepOp;
    glassSweep.style.transform = 'translateX(' + sweepX + '%)';
  } else {
    glassSweep.style.opacity = 0;
  }

  // === 7. Dots — spring pop with colored glow ===
  for (var i = 0; i < 3; i++) {
    var dotRaw = progress(t, DOT_START + i * DOT_STAGGER, DOT_DUR);
    var dotP   = spring(dotRaw, SP_HIGH_DECAY, SP_HIGH_FREQ);
    var dotScale = Math.max(0, dotP);
    dots[i].style.opacity = Math.min(1, dotRaw * 3);
    dots[i].style.transform = 'scale(' + dotScale + ')';
    // Color-matched glow that fades after pop
    var glowFade = Math.max(0, 1 - dotRaw * 2.5);
    if (glowFade > 0) {
      dots[i].style.boxShadow = '0 0 ' + (12 * glowFade).toFixed(1) + 'px rgba(' + DOT_GLOWS[i] + ',' + (0.6 * glowFade).toFixed(3) + ')';
    } else {
      dots[i].style.boxShadow = 'none';
    }
  }

  // === 8. Heading letters — line 1 (blur + scale + slide + spring) ===
  for (var i = 0; i < claudeSpans.length; i++) {
    var lRaw = progress(t, CLAUDE_START + i * LETTER_STAGGER, LETTER_ANIM_DUR);
    if (lRaw >= 1) {
      // Snap to exact final state — no transform means no compositing layer jitter
      claudeSpans[i].style.opacity   = 1;
      claudeSpans[i].style.filter    = 'none';
      claudeSpans[i].style.transform = 'none';
    } else {
      var lp   = spring(lRaw, SP_MEDIUM_DECAY, SP_MEDIUM_FREQ);
      var letterOp   = Math.min(1, lRaw * 2.5);
      var letterBlur = 8 * Math.max(0, 1 - Math.min(1, lRaw * 2));
      var letterY    = 30 * (1 - lp);
      var letterSc   = 1.1 - 0.1 * lp;
      claudeSpans[i].style.opacity   = letterOp;
      claudeSpans[i].style.filter    = letterBlur > 0.1 ? 'blur(' + letterBlur.toFixed(1) + 'px)' : 'none';
      claudeSpans[i].style.transform = 'translateY(' + letterY.toFixed(2) + 'px) scale(' + letterSc.toFixed(4) + ')';
    }
  }

  // === 9. Heading letters — line 2 (same treatment) ===
  for (var i = 0; i < codeSpans.length; i++) {
    var lRaw = progress(t, CODE_START + i * LETTER_STAGGER, LETTER_ANIM_DUR);
    if (lRaw >= 1) {
      codeSpans[i].style.opacity   = 1;
      codeSpans[i].style.filter    = 'none';
      codeSpans[i].style.transform = 'none';
    } else {
      var lp   = spring(lRaw, SP_MEDIUM_DECAY, SP_MEDIUM_FREQ);
      var letterOp   = Math.min(1, lRaw * 2.5);
      var letterBlur = 8 * Math.max(0, 1 - Math.min(1, lRaw * 2));
      var letterY    = 30 * (1 - lp);
      var letterSc   = 1.1 - 0.1 * lp;
      codeSpans[i].style.opacity   = letterOp;
      codeSpans[i].style.filter    = letterBlur > 0.1 ? 'blur(' + letterBlur.toFixed(1) + 'px)' : 'none';
      codeSpans[i].style.transform = 'translateY(' + letterY.toFixed(2) + 'px) scale(' + letterSc.toFixed(4) + ')';
    }
  }

  // === 10. Text glow — fade in + ambient drift ===
  var glowP = easeOutCubic(progress(t, GLOW_START, GLOW_DUR));
  var driftX = Math.sin(t * 0.8) * 8;
  var driftY = Math.sin(t * 0.5) * 5;
    textGlow.style.opacity = glowP;
  textGlow.style.left  = (10 + driftX) + 'px';
  textGlow.style.top   = 'calc(42% + ' + driftY + 'px)';

  // === 11. Terminal content ===
  renderTerminal(t);
}

// ─── Terminal content renderer ──────────────────────────────────────────────

function renderTerminal(t) {
  var lines = [];
  var lastTypeIdx = -1;
  var isTypingActive = false;

  for (var i = 0; i < TERM_EVENTS.length; i++) {
    var ev = TERM_EVENTS[i];
    if (t < ev.t) break;

    if (ev.mode === 'blank') {
      lines.push('<div class="line">&nbsp;</div>');
      continue;
    }

    if (ev.mode === 'fade') {
      var fadeP = clamp((t - ev.t) / ev.dur, 0, 1);
      lines.push('<div class="line" style="opacity:' + fadeP.toFixed(3) + '"><span class="' + ev.cls + '">' + escapeHtml(ev.text) + '</span></div>');
      continue;
    }

    if (ev.mode === 'ready') {
      var fadeP = clamp((t - ev.t) / ev.dur, 0, 1);
      var glowAge = t - ev.t;
      var glowI = Math.max(0, 1 - glowAge / 0.4);
      var style = 'opacity:' + fadeP.toFixed(3);
      if (glowI > 0.01) {
        style += ';text-shadow:0 0 ' + (20 * glowI).toFixed(1) + 'px rgba(52,208,88,' + (0.8 * glowI).toFixed(3) + ')';
      }
      lines.push('<div class="line" style="' + style + '"><span class="' + ev.cls + '">' + escapeHtml(ev.text) + '</span></div>');
      continue;
    }

    if (ev.mode === 'type') {
      var elapsed = t - ev.t;
      var visibleChars = 0;
      for (var j = 0; j < ev.charTimes.length; j++) {
        if (elapsed >= ev.charTimes[j]) visibleChars = j + 1;
        else break;
      }

      var promptHtml = ev.prompt ? '<span class="p">' + escapeHtml(ev.prompt) + '</span> ' : '';
      var visibleText = ev.text.substring(0, visibleChars);
      var textCls = ev.cls || 'c';

      lines.push('<div class="line">' + promptHtml + '<span class="' + textCls + '">' + escapeHtml(visibleText) + '</span></div>');

      lastTypeIdx = lines.length - 1;
      isTypingActive = visibleChars < ev.text.length;
      continue;
    }
  }

  // Append cursor to the last typed line
  if (lastTypeIdx >= 0) {
    var isIdle = !isTypingActive;
    var glowI, cursorOp;
    if (isIdle) {
      glowI    = 0.4 + 0.6 * Math.pow(Math.sin(t * 3), 2);
      cursorOp = 0.3 + 0.6 * Math.pow(Math.sin(t * 2.5), 2);
    } else {
      glowI    = 1.0;
      cursorOp = 0.9;
    }
    var glowSize  = (8 * glowI).toFixed(1);
    var glowAlpha = (0.6 * glowI).toFixed(3);
    var cursorHtml = '<span class="cur" style="opacity:' + cursorOp.toFixed(3) +
      ';box-shadow:0 0 ' + glowSize + 'px rgba(255,184,144,' + glowAlpha + ')"></span>';

    // Insert cursor before closing </div>
    lines[lastTypeIdx] = lines[lastTypeIdx].replace(/<\/div>$/, cursorHtml + '</div>');
  }

  termBody.innerHTML = lines.join('');
}

// ─── HTML escaping ──────────────────────────────────────────────────────────

function escapeHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\u00A0/g, '&nbsp;');
}

// ─── Initialize ─────────────────────────────────────────────────────────────

setTime(0);
</script>
</body>
